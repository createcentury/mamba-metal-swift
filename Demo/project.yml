name: MambaMetalDemo

options:
  bundleIdPrefix: dev.createcentury
  deploymentTarget:
    iOS: "17.0"

packages:
  mamba-metal-swift:
    path: ..
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.0"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.9.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main

targets:
  MambaMetalDemo:
    type: application
    platform: iOS
    sources:
      - path: MambaMetalDemo
    dependencies:
      - package: mamba-metal-swift
        product: MambaMetal
      - package: swift-transformers
        product: Hub
      - package: swift-transformers
        product: Tokenizers
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
    info:
      path: MambaMetalDemo/Info.plist
      properties:
        UILaunchStoryboardName: ""
        CFBundleDisplayName: MambaMetal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.createcentury.MambaMetalDemo
        DEVELOPMENT_TEAM: SF4W9APQ6S
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
